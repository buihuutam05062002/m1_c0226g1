<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<style>
    .calender{
        border-collapse: collapse;
        border-spacing: 0;
    }
    .calender th{
        padding: 1em;
    }
    .calender td{
        border: 3px solid gray ;
        padding: 20px;
        text-align: center;
    }
    .calender .row1{
        background: yellow;
    }
    .row1 th {
        border: 3px solid white ;
        color: white;
    }
    .calender .row1 th:nth-child(1) {
        background: red;
    }
    .calender .row1 th:nth-child(7){
        background: blue;
    }
    .row2 th:nth-child(1){
        color: red;
    }
    .row2 th:nth-child(7){
        color: blue;
    }
    tr td:nth-child(1){
        color: red;
    }
    tr td:nth-child(7){
        color: blue;
    }
    sub{
        color: black;
    }
</style>
<body>
    <h1 style="color: blue">Tháng 10 - October</h1>
    <table class="calender">
        <tr class="row1">
            <th>C.Nhật</th>
            <th>T.Hai</th>
            <th>T.Ba</th>
            <th>T.Tư</th>
            <th>T.Năm</th>
            <th>T.Sáu</th>
            <th>T.Bảy</th>
        </tr>
        <tr class="row2">
            <th class="">Sun</th>
            <th>Mon</th>
            <th>Tue</th>
            <th>Web</th>
            <th>Thu</th>
            <th>Fri</th>
            <th>Sat</th>
        </tr>
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td>1<sub>13</sub></td>
            <td>2 <sub>14</sub>    </td>
            <td>3 <sub>15</sub> </td>
        </tr>
        <tr>
            <td>4<sub>16</sub></td>
            <td>5 <sub>17</sub>    </td>
            <td>6 <sub>18</sub> </td>
            <td>7 <sub>19</sub></td>
            <td>8 <sub>20</sub></td>
            <td>9 <sub>21</sub></td>
            <td>10 <sub>22</sub></td>
        </tr>
        <tr>
            <td>11 <sub>23</sub></td>
            <td>12 <sub>24</sub></td>
            <td>13 <sub>25</sub></td>
            <td>14 <sub>26</sub></td>
            <td>15 <sub>27</sub></td>
            <td>16 <sub>28</sub></td>
            <td>17 <sub>29</sub></td>
        </tr>
        <tr>
            <td>18 <sub>30</sub></td>
            <td>19 <sub>31</sub></td>
            <td>20 <sub>1</sub></td>
            <td>21 <sub>2</sub></td>
            <td>22 <sub>3</sub></td>
            <td>23 <sub>4</sub></td>
            <td>24 <sub>5</sub></td>
        </tr>
        <tr>
            <td>25 <sub>6</sub></td>
            <td>26 <sub>7</sub></td>
            <td>27 <sub>8</sub></td>
            <td>28 <sub>9</sub></td>
            <td>29 <sub>10</sub></td>
            <td>30 <sub>11</sub></td>
            <td>31 <sub>12</sub></td>
        </tr>
    </table>
</body>
</html>
